# Use the fast, CPU-friendly backend
backend = "xrender";
vsync = false;

# Kill all heavy effects
shadow = false;
fading = false;
blur-background = false;
blur-method = "none";

# FIX THE BLACK CORNERS: 
# Tell Picom to stop drawing corners and let Rofi/AwesomeWM handle their own shapes
corner-radius = 0;
detect-rounded-corners = true;
detect-client-opacity = true;
